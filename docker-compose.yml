services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-orbit}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-orbit}
      - POSTGRES_DB=${POSTGRES_DB:-orbit}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orbit} -d ${POSTGRES_DB:-orbit}"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      # All sensitive values come from .env — never hardcoded here.
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://orbit:orbit@db:5432/orbit}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ACCESS_TOKEN_TTL_MINUTES=${ACCESS_TOKEN_TTL_MINUTES:-15}
      - REFRESH_TOKEN_TTL_DAYS=${REFRESH_TOKEN_TTL_DAYS:-7}
      - VERIFICATION_CODE_TTL_MINUTES=${VERIFICATION_CODE_TTL_MINUTES:-30}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/2}
      - CLEANUP_DAYS=${CLEANUP_DAYS:-2}
      - CLEANUP_INTERVAL_MINUTES=${CLEANUP_INTERVAL_MINUTES:-60}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-worker:
    build: .
    command: celery -A app.workers.celery_app.celery worker -l info
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://orbit:orbit@db:5432/orbit}
      - CLEANUP_DAYS=${CLEANUP_DAYS:-2}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    build: .
    command: celery -A app.workers.celery_app.celery beat -l info
    environment:
      - CLEANUP_INTERVAL_MINUTES=${CLEANUP_INTERVAL_MINUTES:-60}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
